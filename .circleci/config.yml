orbs:
  docker: circleci/docker@2.1.1
version: 2.1
executors:
  docker-publisher:
    environment:
      IMAGE_NAME: docker.io/adityabawne37/hinata
    docker:
      - image: circleci/node:latest
        auth:
          username: $DOCKER_USERNAME
          password: $DOCKER_PASSWORD

jobs:
  publishLatestToHub:
    executor: docker-publisher
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.7
      - run:
          name: Publish Docker Image to Docker Hub
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker build -t docker.io/adityabawne37/hinata .
            docker push docker.io/adityabawne37/hinata:latest

workflows:
  version: 2
  build-master:
    jobs:
      - publishLatestToHub